# docker compose up --build  →  Postgres + pipeline + dashboard.
# Credentials come from .env (see .env.example). The 'cars' fallbacks are dev-only defaults.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cars}
      POSTGRES_DB: ${POSTGRES_DB:-cars}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cars}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_BACKEND: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-cars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cars}
      POSTGRES_DB: ${POSTGRES_DB:-cars}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    # Replay time-ordered batches to build run history, then exit.
    command: ["python", "-m", "src.pipeline", "--backfill"]

  dashboard:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_BACKEND: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-cars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cars}
      POSTGRES_DB: ${POSTGRES_DB:-cars}
    command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"

volumes:
  pgdata:
